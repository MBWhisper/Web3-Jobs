<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0a0a"/>

  <!-- Outer hexagon -->
  <g filter="url(#glow)">
    <polygon points="16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5"
      stroke="url(#g)" stroke-width="1.5" fill="#0a0a0a"/>

    <!-- Inner hexagon (faint) -->
    <polygon points="16,8 23,12 23,20 16,24 9,20 9,12"
      stroke="#ff1493" stroke-width="0.6" fill="none" opacity="0.3"/>

    <!-- Center node -->
    <circle cx="16" cy="16" r="2.5" fill="url(#g)"/>

    <!-- 6 connector lines from center to corners -->
    <line x1="16" y1="8"  x2="16" y2="13.5" stroke="#ff1493" stroke-width="1" opacity="0.8"/>
    <line x1="16" y1="18.5" x2="16" y2="24" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
    <line x1="9"  y1="12" x2="14" y2="15"  stroke="#ff1493" stroke-width="1" opacity="0.8"/>
    <line x1="23" y1="12" x2="18" y2="15"  stroke="#00ffff" stroke-width="1" opacity="0.8"/>
    <line x1="9"  y1="20" x2="14" y2="17"  stroke="#00ffff" stroke-width="1" opacity="0.6"/>
    <line x1="23" y1="20" x2="18" y2="17"  stroke="#ff1493" stroke-width="1" opacity="0.6"/>

    <!-- Corner dots -->
    <circle cx="16" cy="3"  r="1" fill="#ff1493"/>
    <circle cx="27" cy="9.5" r="1" fill="#00ffff"/>
    <circle cx="27" cy="22.5" r="1" fill="#ff1493"/>
    <circle cx="16" cy="29" r="1" fill="#00ffff"/>
    <circle cx="5"  cy="22.5" r="1" fill="#ff1493"/>
    <circle cx="5"  cy="9.5" r="1" fill="#00ffff"/>
  </g>
</svg>
